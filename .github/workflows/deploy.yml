name: Deploy to Production

on:
  push:
    branches: [master]
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hammediora/workoutapp:latest
            ghcr.io/hammediora/workoutapp:${{ github.sha }}

  deploy:
    name: Deploy on the-boss
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -euo pipefail

          APP_DIR="/opt/apps/workoutapp"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          cat > docker-compose.prod.yml << 'COMPOSE_EOF'
          services:
            app:
              image: ghcr.io/hammediora/workoutapp:latest
              container_name: workoutapp-app
              restart: unless-stopped
              ports:
                - "127.0.0.1:3020:3000"
              env_file:
                - .env
          COMPOSE_EOF

          cat > .env << ENV_EOF
          NODE_ENV=production
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_GOOGLE_ID=${{ secrets.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET=${{ secrets.AUTH_GOOGLE_SECRET }}
          AUTH_TRUST_HOST=true
          WGER_TOKEN=${{ secrets.WGER_TOKEN }}
          MUSCLEWIKI_API_KEY=${{ secrets.MUSCLEWIKI_API_KEY }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          ENV_EOF

          if [ -n "${{ secrets.GHCR_PAT }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          fi

          docker compose -f docker-compose.prod.yml pull
          docker compose -f docker-compose.prod.yml up -d --remove-orphans

          echo "==> Health check on 127.0.0.1:3020"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3020/ >/dev/null 2>&1; then
              echo "App is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Health check failed"
              docker compose -f docker-compose.prod.yml logs app --tail 80
              exit 1
            fi
            sleep 2
          done

          docker image prune -af --filter 'until=168h'
          EOF

      - name: Remove SSH key
        if: always()
        run: rm -f ~/.ssh/id_ed25519
